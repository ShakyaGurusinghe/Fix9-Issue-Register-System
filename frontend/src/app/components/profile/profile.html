<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card border-0 shadow-sm p-4 p-lg-5" style="border-radius: 20px;">
        <div class="text-center mb-5">
          <h3 class="fw-bold mb-4">Welcome {{ user?.name?.split(' ')[0] }} !</h3>

          <!-- Profile Photo -->
          <div class="position-relative d-inline-block">
            <div class="profile-photo-container overflow-hidden rounded-circle shadow-sm"
              style="width: 150px; height: 150px; border: 4px solid #fff;">
              <img [src]="user?.profile_photo || user?.image || 'https://picsum.photos/seed/user/150/150'"
                class="w-100 h-100 object-fit-cover" alt="Profile">
            </div>
            <label for="photoUpload"
              class="position-absolute bottom-0 end-0 bg-primary text-white rounded-circle d-flex align-items-center justify-content-center cursor-pointer shadow"
              style="width: 40px; height: 40px; border: 3px solid #fff;">
              <i class="bi bi-pencil-fill small"></i>
              <input type="file" id="photoUpload" class="d-none" (change)="onFileSelected($event)" accept="image/*">
            </label>
          </div>
        </div>

        <!-- Profile Form -->
        <form (ngSubmit)="updateProfile()">
          <div class="mb-4">
            <label class="form-label text-muted small fw-bold">Name</label>
            <input type="text" class="form-control p-3 bg-light border-0"
              [(ngModel)]="user.name" name="name" placeholder="Your Name">
          </div>

          <div class="mb-4">
            <label class="form-label text-muted small fw-bold">Email Address</label>
            <input type="email" class="form-control p-3 bg-light border-0"
              [value]="user?.email" disabled>
          </div>

          <!-- Inline feedback (shown just above buttons) -->
          @if (successMessage) {
            <div class="alert alert-success d-flex align-items-center gap-2 py-2 mb-3">
              <i class="bi bi-check-circle-fill"></i> {{ successMessage }}
            </div>
          }
          @if (errorMessage) {
            <div class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3">
              <i class="bi bi-x-circle-fill"></i> {{ errorMessage }}
            </div>
          }

          <div class="d-flex flex-column gap-3">
            <button type="submit" class="btn btn-primary p-3 fw-bold"
              style="background-color: #2196F3; border: none; border-radius: 10px;">
              Update Profile
            </button>
            <button type="button" class="btn btn-danger p-3 fw-bold"
              (click)="showDeleteModal = true"
              style="border: none; border-radius: 10px;">
              <i class="bi bi-trash3 me-2"></i> Delete Account
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
@if (showDeleteModal) {
  <div class="modal-backdrop fade show"></div>
  <div class="modal fade show d-block" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
        <div class="modal-body p-4 text-center">
          <div class="text-danger mb-3">
            <i class="bi bi-exclamation-triangle fs-1"></i>
          </div>
          <h5 class="fw-bold mb-3">Are you sure you want to delete this account?</h5>
          <p class="text-muted mb-4">This action cannot be undone. All your data will be permanently removed.</p>
          <div class="d-flex gap-3 justify-content-center">
            <button type="button" class="btn btn-light px-4 py-2 fw-bold"
              (click)="showDeleteModal = false" style="border-radius: 10px;">Cancel</button>
            <button type="button" class="btn btn-danger px-4 py-2 fw-bold"
              (click)="confirmDelete()" style="border-radius: 10px;">Delete</button>
          </div>
        </div>
      </div>
    </div>
  </div>
}
