<div class="d-flex vh-100 overflow-hidden">
  <div class="flex-grow-1 overflow-auto bg-light p-3 p-lg-4">

    <!-- Mobile Header -->
    <div class="d-lg-none mb-4 d-flex justify-content-between align-items-center">
      <button class="btn btn-white shadow-sm">
        <i class="bi bi-list fs-3"></i>
      </button>
      <h4 class="mb-0 fw-bold">Projects</h4>
      <div style="width: 40px;"></div>
    </div>

    <!-- Banner -->
    <div class="card border-0 mb-5 overflow-hidden position-relative" style="border-radius: 20px; height: 200px;">
      <img src="https://www.adpunctum.co.uk/wp-content/uploads/2017/06/Project-Management-Banner-c.png" class="w-100 h-100 object-fit-cover" alt="Banner">
      <div class="position-absolute top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-end pe-5"
        style="background: rgba(0,0,0,0.3);">
        <button [routerLink]="['/projects/new']"
          class="btn btn-primary px-4 py-2 fw-bold d-flex align-items-center gap-2"
          style="background-color: #1c7ecf; border: none; border-radius: 10px;">
          <i class="bi bi-plus-lg"></i>
          <span>New Project</span>
        </button>
      </div>
    </div>

    <!-- Projects List -->
    <div class="row g-4">
      @for (project of projects; track project.id) {
        <div class="col-12">
          <div class="card border-0 shadow-sm overflow-hidden project-card"
            [routerLink]="['/projects', project.id]"
            style="border-radius: 20px; cursor: pointer; height: 220px;">
            <div class="row g-0 h-100">
              <div class="col-md-4" style="height: 220px; overflow: hidden;">
                <img [src]="project.image || ('https://picsum.photos/seed/' + project.id + '/600/400')"
                  class="w-100 h-100 object-fit-cover" alt="Project">
              </div>
              <div class="col-md-8 p-3 d-flex flex-column justify-content-center overflow-hidden">
                <div class="d-flex justify-content-between align-items-start mb-1">
                  <h5 class="fw-bold mb-0 text-truncate me-2">{{ project.name }}</h5>
                  <div class="d-flex gap-2 flex-shrink-0">
                    <button class="btn btn-link text-primary p-0"
                      [routerLink]="['/projects/edit', project.id]"
                      (click)="$event.stopPropagation()">
                      <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-link text-danger p-0"
                      (click)="openDeleteModal(project.id, $event)">
                      <i class="bi bi-trash"></i>
                    </button>
                  </div>
                </div>
                <p class="text-muted mb-0 small text-truncate-2">{{ project.description }}</p>
              </div>
            </div>
          </div>
        </div>
      } @empty {
        <div class="col-12 text-center py-5">
          <div class="mb-3 text-muted">
            <i class="bi bi-folder2-open display-1"></i>
          </div>
          <h4 class="text-muted">No projects found</h4>
          <p class="text-muted">Create your first project to get started!</p>
          <button [routerLink]="['/projects/new']" class="btn btn-primary px-4 mt-2" style="border-radius: 10px;">Create Project</button>
        </div>
      }
    </div>
  </div>

  <!-- Delete Modal -->
  @if (showDeleteModal) {
    <div class="modal-backdrop fade show"></div>
    <div class="modal fade show d-block" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
          <div class="modal-body p-4 text-center">
            <h5 class="fw-bold mb-4">Are you sure you want to delete this?</h5>
            <div class="d-flex gap-3 justify-content-center">
              <button class="btn btn-light px-4 py-2 fw-bold" (click)="showDeleteModal = false" style="border-radius: 10px;">Cancel</button>
              <button class="btn btn-danger px-4 py-2 fw-bold" (click)="confirmDelete()" style="border-radius: 10px;">Delete</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  }
</div>
