<div class="d-flex vh-100 overflow-hidden">
  <div class="flex-grow-1 overflow-auto bg-light p-3 p-lg-4">

    <!-- Mobile Header -->
    <div class="d-lg-none mb-4 d-flex justify-content-between align-items-center">
      <button class="btn btn-white shadow-sm">
        <i class="bi bi-list fs-3"></i>
      </button>
      <h4 class="mb-0 fw-bold">Project Details</h4>
      <div style="width: 40px;"></div>
    </div>

    @if (project) {
      <div class="container-fluid py-2">
        <h2 class="fw-bold mb-4">{{ project.name }}</h2>

        <div class="card border-0 shadow-sm overflow-hidden mb-4" style="border-radius: 20px;">
          <img [src]="project.image || ('https://picsum.photos/seed/' + project.id + '/1200/500')"
            class="w-100 object-fit-cover" style="height: 400px;" alt="Project">
        </div>

        <div class="card border-0 shadow-sm p-4 p-lg-5" style="border-radius: 20px;">
          <p class="text-muted fs-5" style="white-space: pre-wrap; line-height: 1.8;">{{ project.description }}</p>

          <div class="mt-4 pt-4 border-top d-flex gap-3">
            <button [routerLink]="['/projects/edit', project.id]"
              class="btn btn-primary px-4 py-2" style="border-radius: 10px;">Edit Project</button>
            <button [routerLink]="['/projects']"
              class="btn btn-light px-4 py-2" style="border-radius: 10px;">Back to Projects</button>
          </div>
        </div>
      </div>
    } @else {
      <div class="text-center py-5 text-muted">
        <i class="bi bi-hourglass-split fs-1 d-block mb-3"></i>
        <p>Loading project...</p>
      </div>
    }
  </div>
</div>
